services:
  launcher:
    # Run this one-shot service with `docker compose run --rm -it launcher up …`.
    # It creates the long-running deploybot container from its persistent config.
    image: ${DEPLOYBOT_IMAGE:-ghcr.io/tomusdrw/github-deploy-bot:latest}
    build: .
    volumes:
      # Required: gives both the launcher and resulting bot root-equivalent
      # control over host containers.
      - /var/run/docker.sock:/var/run/docker.sock
      - deploybot-data:/data
      - deploybot-config:/config
    environment:
      DEPLOYBOT_CONFIG_VOLUME: ${DEPLOYBOT_CONFIG_VOLUME:-deploybot-config}
      DEPLOYBOT_DATA_VOLUME: ${DEPLOYBOT_DATA_VOLUME:-deploybot-data}
    profiles: ["launcher"]

volumes:
  deploybot-data:
    name: ${DEPLOYBOT_DATA_VOLUME:-deploybot-data}
  deploybot-config:
    name: ${DEPLOYBOT_CONFIG_VOLUME:-deploybot-config}
